<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VENDIX</title>
  <link rel="icon" type="image/png" href="favicon-vendix.png" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #6f3817 0%, #b46a27 100%);
      color: #fff;
    }

    .page {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 14px 24px;
    }

    .hero {
      text-align: center;
    }

    .logo {
      width: 92px;
      border-radius: 14px;
      background: #fff;
      padding: 8px;
      margin: 0 auto 8px;
      display: block;
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.2;
    }

    .desc {
      margin: 10px auto 0;
      max-width: 420px;
      font-size: 14px;
      line-height: 1.4;
      opacity: 0.95;
    }

    .benefits {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .benefit {
      background: rgba(255,255,255,0.12);
      padding: 13px 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }

    .mockup-wrap {
      margin-top: 16px;
      display: flex;
      justify-content: center;
    }

    .mockup-frame {
      width: 100%;
      max-width: 280px;
      background: #111;
      padding: 5px;
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.28);
    }

    .mockup {
      width: 100%;
      display: block;
      border-radius: 11px;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
    }

    .btn-demo {
      background: #31cc6d;
      color: #fff;
    }

    .btn-whats {
      background: #fff;
      color: #6f3817;
    }

    @media (max-width: 420px) {
      .page {
        padding: 14px 12px 22px;
      }

      .logo {
        width: 84px;
      }

      h1 {
        font-size: 30px;
      }

      .subtitle {
        font-size: 15px;
      }

      .desc {
        font-size: 13px;
      }

      .benefit {
        font-size: 13px;
        padding: 12px;
      }

      .mockup-frame {
        max-width: 250px;
      }

      .btn {
        font-size: 15px;
        padding: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <img src="logo-vendix.png" alt="Logo VENDIX" class="logo" />

      <h1>VENDIX</h1>

      <div class="subtitle">Sistema de vendas completo</div>

      <div class="desc">
        Venda, estoque e caixa de forma simples e profissional em qualquer dispositivo.
      </div>
    </section>

    <section class="benefits">
      <div class="benefit">✔ Funciona no celular, tablet e computador</div>
      <div class="benefit">✔ Controle total de vendas e estoque</div>
      <div class="benefit">✔ Visual moderno e fácil de usar</div>
      <div class="benefit">✔ Ideal para qualquer comércio</div>
    </section>

    <section class="mockup-wrap">
      <div class="mockup-frame">
        <img src="pao_belo.png" alt="Demonstração do sistema" class="mockup" />
      </div>
    </section>

    <section class="actions">
      <a href="https://radarjogospro.github.io/pdv-pao-belo/" class="btn btn-demo">
        Ver demonstração
      </a>

      <a href="https://wa.me/5511913237529" class="btn btn-whats">
        Falar no WhatsApp
      </a>
    </section>
  </main>
</body>
</html>
