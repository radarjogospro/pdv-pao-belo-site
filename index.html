<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VENDIX</title>
  <link rel="icon" type="image/png" href="favicon-vendix.png" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #6f3817 0%, #b46a27 100%);
      color: #fff;
    }

    .page {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 14px 24px;
    }

    .hero {
      text-align: center;
    }

    .logo {
      width: 80px;
      border-radius: 12px;
      background: #fff;
      padding: 6px;
      margin: 0 auto 8px;
      display: block;
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 900;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 16px;
      font-weight: 800;
    }

    .desc {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.4;
      opacity: 0.95;
    }

    .benefits {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .benefit {
      background: rgba(255,255,255,0.12);
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }

    /* MOCKUP AJUSTADO (PEQUENO E CENTRAL) */
    .mockup-wrap {
      margin-top: 14px;
      display: flex;
      justify-content: center;
    }

    .mockup-frame {
      width: 100%;
      max-width: 240px;
      background: #111;
      padding: 4px;
      border-radius: 14px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.28);
    }

    .mockup {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    /* BOTÕES SEMPRE VISÍVEIS */
    .actions {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
    }

    .btn-demo {
      background: #2ecc71;
      color: #fff;
    }

    .btn-whats {
      background: #fff;
      color: #6f3817;
    }

  </style>
</head>

<body>

  <main class="page">

    <section class="hero">
      <img src="logo-vendix.png" alt="Logo VENDIX" class="logo" />

      <h1>VENDIX</h1>

      <div class="subtitle">PDV simples e profissional</div>

      <div class="desc">
        Controle vendas, estoque e caixa em qualquer dispositivo.
      </div>
    </section>

    <section class="benefits">
      <div class="benefit">✔ Funciona no celular, tablet e computador</div>
      <div class="benefit">✔ Controle total de vendas e estoque</div>
      <div class="benefit">✔ Ideal para qualquer comércio</div>
    </section>

    <section class="mockup-wrap">
      <div class="mockup-frame">
        <img src="pao_belo.png" alt="Sistema VENDIX" class="mockup" />
      </div>
    </section>

    <section class="actions">
      <a href="https://radarjogospro.github.io/pdv-pao-belo/" class="btn btn-demo">
        Ver demonstração
      </a>

      <a href="https://wa.me/5511913237529" class="btn btn-whats">
        Falar no WhatsApp
      </a>
    </section>

  </main>

</body>
</html>
