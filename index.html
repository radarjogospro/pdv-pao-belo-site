<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VENDIX</title>
  <link rel="icon" type="image/png" href="favicon-vendix.png" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #6f3817 0%, #b46a27 100%);
      color: #ffffff;
    }

    .page {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 18px 14px 24px;
    }

    .hero {
      text-align: center;
    }

    .logo {
      width: 82px;
      border-radius: 14px;
      background: #fff;
      padding: 6px;
      margin: 0 auto 10px;
      display: block;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.2;
    }

    .desc {
      margin: 10px auto 0;
      max-width: 470px;
      font-size: 14px;
      line-height: 1.45;
      opacity: 0.95;
    }

    .benefits {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .benefit {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 13px 14px;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
    }

    .mockup-wrap {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }

    .mockup-frame {
      width: 100%;
      max-width: 500px;
      background: #111;
      padding: 6px;
      border-radius: 20px;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.26);
    }

    .mockup {
      width: 100%;
      display: block;
      border-radius: 14px;
    }

    @media (max-width: 420px) {
      .page {
        padding: 16px 12px 22px;
      }

      .logo {
        width: 76px;
      }

      h1 {
        font-size: 30px;
      }

      .subtitle {
        font-size: 15px;
      }

      .desc {
        font-size: 13px;
      }

      .benefit {
        font-size: 13px;
        padding: 12px;
      }

      .mockup-frame {
        max-width: 100%;
        border-radius: 18px;
      }

      .mockup {
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <img src="logo-vendix.png" alt="Logo VENDIX" class="logo" />

      <h1>VENDIX</h1>

      <div class="subtitle">PDV simples e profissional</div>

      <div class="desc">
        Controle vendas, estoque e caixa em qualquer dispositivo.
      </div>
    </section>

    <section class="benefits">
      <div class="benefit">✔ Funciona no celular, tablet e computador</div>
      <div class="benefit">✔ Controle total de vendas e estoque</div>
      <div class="benefit">✔ Ideal para qualquer comércio</div>
    </section>

    <section class="mockup-wrap">
      <div class="mockup-frame">
        <img src="pao_belo.png" alt="Sistema VENDIX" class="mockup" />
      </div>
    </section>
  </main>
</body>
</html>
